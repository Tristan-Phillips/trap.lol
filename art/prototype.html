<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Echoes // Prototype</title>
    <style>
        /* --- VISUAL ENGINE (CSS) --- */
        :root {
            --void-core: #030304;
            --void-surface: rgba(10, 10, 12, 0.45);
            --spice-amber: #d97736;
            --spice-glow: rgba(217, 119, 54, 0.15);
            --neon-tease: #ff2a8f;
            --neon-glow: rgba(255, 42, 143, 0.25);
            --text-muted: #666;
            --text-bright: #e0e0e0;
            --font-stack: system-ui, -apple-system, sans-serif;
            /* The 'sensual' curve - slow start, fast acceleration, snapping to rest */
            --transition-tactile: 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--void-core);
            color: var(--text-bright);
            font-family: var(--font-stack);
            overflow-x: hidden;
            /* Custom cursor for the void */
            cursor: crosshair; 
        }

        /* The Echo Simulation Layer */
        #void-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* --- NAVIGATION & ICONS --- */
        .gallery-controls {
            position: fixed;
            top: 2rem; right: 2rem;
            display: flex; gap: 1.5rem;
            z-index: 10;
        }

        .icon-btn {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            width: 44px; height: 44px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: var(--transition-tactile);
            backdrop-filter: blur(8px);
            outline: none;
        }

        .icon-btn:hover {
            color: var(--neon-tease);
            border-color: var(--neon-tease);
            background: rgba(255, 42, 143, 0.05);
            box-shadow: 0 0 20px var(--neon-glow);
            transform: scale(1.1) rotate(8deg);
        }

        .icon-btn svg { width: 22px; height: 22px; stroke-width: 1.2px; }

        /* --- THE GRID --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 2.5rem;
            padding: 8rem 3rem 4rem;
            max-width: 1800px;
            margin: 0 auto;
        }

        .thumb-card {
            position: relative;
            aspect-ratio: 4/5;
            border-radius: 2px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.02);
            transition: var(--transition-tactile);
            background: #0a0a0c;
        }

        .thumb-card img {
            width: 100%; height: 100%;
            object-fit: cover;
            /* Grayscale by default, forcing the user to interact to see the life in it */
            filter: grayscale(100%) brightness(0.7) contrast(1.2);
            transition: filter 0.6s ease, transform var(--transition-tactile);
        }

        .thumb-card:hover {
            border-color: var(--spice-amber);
            box-shadow: 0 0 30px var(--spice-glow);
            transform: translateY(-8px);
            z-index: 2;
        }

        .thumb-card:hover img {
            filter: grayscale(0%) brightness(1) contrast(1.1);
            transform: scale(1.03);
        }

        /* --- THE LIGHTBOX (DETENTION) --- */
        .glass-modal {
            position: fixed;
            inset: 0;
            width: 100vw; height: 100vh;
            background: var(--void-surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: none;
            margin: auto;
            padding: 3rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            display: flex;
            align-items: center; justify-content: center;
        }

        .glass-modal[open] {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-content {
            display: flex;
            flex-direction: row;
            width: 100%; max-width: 1600px;
            height: 85vh;
            gap: 3rem;
            opacity: 0;
            transform: scale(0.98) translateY(10px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transition-delay: 0.1s;
        }

        .glass-modal[open] .lightbox-content {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .image-container {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        .image-container img {
            max-width: 100%; max-height: 100%;
            object-fit: contain;
            border-radius: 2px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.9);
            border: 1px solid rgba(255, 42, 143, 0.1);
        }

        .meta-container {
            width: 380px;
            display: flex;
            flex-direction: column;
            padding: 2.5rem;
            background: linear-gradient(180deg, rgba(5,5,6,0.8) 0%, rgba(3,3,4,0.9) 100%);
            border-left: 1px solid var(--neon-tease);
            border-radius: 2px;
            position: relative;
            overflow-y: auto;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .meta-container.empty-meta { display: none; }

        .close-btn { 
            position: absolute; 
            top: 1.5rem; right: 1.5rem; 
            border-color: transparent;
        }

        .desc-text {
            margin-top: 4rem;
            font-size: 0.95rem;
            line-height: 1.8;
            color: #ccc;
            font-style: italic;
            border-bottom: 1px solid rgba(217, 119, 54, 0.2);
            padding-bottom: 2rem;
            margin-bottom: 2rem;
            white-space: pre-wrap;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .stat-item { display: flex; flex-direction: column; gap: 0.3rem; }

        .stat-key {
            font-size: 0.65rem; text-transform: uppercase;
            color: var(--spice-amber); letter-spacing: 1.5px;
        }

        .stat-val {
            font-size: 1.1rem; color: var(--neon-tease);
            font-weight: 300; letter-spacing: 0.5px;
        }

        /* Scrollbar styling for meta */
        .meta-container::-webkit-scrollbar { width: 4px; }
        .meta-container::-webkit-scrollbar-track { background: transparent; }
        .meta-container::-webkit-scrollbar-thumb { background: var(--spice-amber); border-radius: 4px; }

        @media (max-width: 1000px) {
            .lightbox-content { flex-direction: column; height: auto; max-height: 90vh; }
            .meta-container { width: 100%; border-left: none; border-top: 1px solid var(--neon-tease); overflow-y: visible; }
            .image-container img { max-height: 50vh; }
        }
    </style>
</head>
<body>

    <canvas id="void-canvas"></canvas>
    
    <nav class="gallery-controls">
        <button id="btn-gacha" class="icon-btn" title="Pull an Echo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><circle cx="15.5" cy="8.5" r="1.5"/><circle cx="15.5" cy="15.5" r="1.5"/><circle cx="8.5" cy="15.5" r="1.5"/><circle cx="12" cy="12" r="1.5"/></svg>
        </button>
        <a href="#" class="icon-btn" title="Return to Core">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
    </nav>

    <main id="gallery-grid" class="grid-container"></main>

    <dialog id="lightbox" class="glass-modal">
        <div class="lightbox-content">
            <div class="image-container">
                <img id="lb-image" src="" alt="Artifact">
            </div>
            <aside id="lb-meta" class="meta-container">
                <button id="btn-close" class="icon-btn close-btn" title="Close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
                <div id="lb-desc" class="desc-text"></div>
                <div id="lb-stats" class="stats-grid"></div>
            </aside>
        </div>
    </dialog>

    <script>
        /* --- LOGIC CORE (JS) --- */

        // 1. Mock Data Injection (Replacing fetch for prototyping)
        // Uses placeholder high-res images to test the layout scaling.
        const MOCK_CATALOG = [
            {
                id: "echo-01",
                thumb: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop",
                src: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1600&auto=format&fit=crop",
                desc: "A scream rendered in static.\nThe walls blur when I look too closely.\n\nI tried to map the topology of the void, but it mapped me instead.",
                stats: { "Chaos": "89.4%", "Resonance": "High", "Origin": "3:14 AM", "Medium": "Charcoal / Digital" }
            },
            {
                id: "echo-02",
                thumb: "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=600&auto=format&fit=crop",
                src: "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1600&auto=format&fit=crop",
                desc: "Synthetic heartbeats.\nSpice in the air, rust in the lungs.",
                stats: { "Stability": "Failing", "Sector": "Zaun Lower", "Exposure": "14 hrs" }
            },
            {
                id: "echo-03",
                thumb: "https://images.unsplash.com/photo-1528460033278-a6ba57020470?q=80&w=600&auto=format&fit=crop",
                src: "https://images.unsplash.com/photo-1528460033278-a6ba57020470?q=80&w=1600&auto=format&fit=crop",
                desc: "", // Deliberately empty to test the UI collapsing
                stats: {}
            },
             {
                id: "echo-04",
                thumb: "https://images.unsplash.com/photo-1604871000636-074fa5117945?q=80&w=600&auto=format&fit=crop",
                src: "https://images.unsplash.com/photo-1604871000636-074fa5117945?q=80&w=1600&auto=format&fit=crop",
                desc: "Just a sketch. The ink bled through the page.\nLike everything else.",
                stats: { "Ink": "Spilled", "Regret": "None" }
            }
        ];

        // 2. The Void Engine (Background Physics)
        class VoidEngine {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.mouse = { x: -1000, y: -1000 }; // Start off-screen
                this.bindEvents();
                this.resize();
                this.initParticles();
                this.animate();
            }

            bindEvents() {
                window.addEventListener('resize', () => this.resize());
                window.addEventListener('mousemove', (e) => {
                    this.mouse.x = e.clientX;
                    this.mouse.y = e.clientY;
                });
                // When mouse leaves window, throw target off-screen
                document.addEventListener('mouseleave', () => {
                    this.mouse.x = -1000;
                    this.mouse.y = -1000;
                });
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            initParticles() {
                this.particles = [];
                // Density scales with screen size, kept lean to prevent CPU thrashing
                const count = Math.floor((window.innerWidth * window.innerHeight) / 15000); 
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        baseSize: Math.random() * 1.5 + 0.5,
                        size: 0,
                        speedX: (Math.random() - 0.5) * 0.3,
                        speedY: (Math.random() - 0.5) * 0.3,
                        // Mix of Dune spice and Jinx neon
                        color: Math.random() > 0.7 ? 'rgba(217, 119, 54, 0.4)' : 'rgba(255, 42, 143, 0.3)' 
                    });
                }
            }

            animate() {
                // Creates a trailing motion blur effect instead of a hard clear
                this.ctx.fillStyle = 'rgba(3, 3, 4, 0.15)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                for (let p of this.particles) {
                    p.x += p.speedX;
                    p.y += p.speedY;

                    // Wrap edges instead of bouncing for a more 'infinite void' feel
                    if (p.x < 0) p.x = this.canvas.width;
                    if (p.x > this.canvas.width) p.x = 0;
                    if (p.y < 0) p.y = this.canvas.height;
                    if (p.y > this.canvas.height) p.y = 0;

                    // Cursor attraction physics
                    let dx = this.mouse.x - p.x;
                    let dy = this.mouse.y - p.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    
                    p.size = p.baseSize;

                    if (dist < 200) {
                        // The sensual pull: creeping, exponential, not linear snap
                        const force = (200 - dist) / 200;
                        p.x += dx * (force * 0.015);
                        p.y += dy * (force * 0.015);
                        p.size = p.baseSize + (force * 1.5); // Swell slightly when pulled
                    }

                    this.ctx.fillStyle = p.color;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fill();
                }
                requestAnimationFrame(() => this.animate());
            }
        }

        // 3. Lightbox State Manager
        class Lightbox {
            constructor() {
                this.dialog = document.getElementById('lightbox');
                this.img = document.getElementById('lb-image');
                this.desc = document.getElementById('lb-desc');
                this.statsGrid = document.getElementById('lb-stats');
                this.metaContainer = document.getElementById('lb-meta');
                
                document.getElementById('btn-close').addEventListener('click', () => this.close());
                this.dialog.addEventListener('click', (e) => {
                    // Close if clicking the void, but not the content
                    if (e.target === this.dialog) this.close();
                });
                
                // Escape key support
                document.addEventListener('keydown', (e) => {
                    if(e.key === 'Escape' && this.dialog.hasAttribute('open')) {
                        e.preventDefault(); // Stop native dialog close to use our custom animation
                        this.close();
                    }
                });
            }

            open(data) {
                this.img.src = data.src;
                let hasMeta = false;
                
                // Populate Description
                if (data.desc && data.desc.trim() !== '') {
                    this.desc.textContent = data.desc; // Prevents HTML injection
                    this.desc.style.display = 'block';
                    hasMeta = true;
                } else {
                    this.desc.style.display = 'none';
                }

                // Populate Stats
                this.statsGrid.innerHTML = '';
                if (data.stats && Object.keys(data.stats).length > 0) {
                    for (const [key, val] of Object.entries(data.stats)) {
                        this.statsGrid.innerHTML += `
                            <div class="stat-item">
                                <span class="stat-key">${key}</span>
                                <span class="stat-val">${val}</span>
                            </div>
                        `;
                    }
                    hasMeta = true;
                }

                // Toggle Side Panel Visbility
                if (hasMeta) {
                    this.metaContainer.classList.remove('empty-meta');
                } else {
                    this.metaContainer.classList.add('empty-meta');
                }

                this.dialog.setAttribute('open', '');
            }

            close() {
                this.dialog.removeAttribute('open');
                // Ephemeral cleanup: wait for CSS transition to finish before wiping source
                setTimeout(() => { 
                    this.img.src = ''; 
                    this.desc.textContent = '';
                    this.statsGrid.innerHTML = '';
                }, 500); 
            }
        }

        // 4. Gallery Controller
        class GalleryController {
            constructor(catalog) {
                this.grid = document.getElementById('gallery-grid');
                this.lightbox = new Lightbox();
                this.catalog = catalog;
                this.init();
            }

            init() {
                this.renderGrid();
                this.bindGacha();
            }

            renderGrid() {
                this.grid.innerHTML = '';
                this.catalog.forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'thumb-card';
                    el.innerHTML = `<img src="${item.thumb}" alt="echo" loading="lazy">`;
                    el.addEventListener('click', () => this.lightbox.open(item));
                    this.grid.appendChild(el);
                });
            }

            bindGacha() {
                const gachaBtn = document.getElementById('btn-gacha');
                if(gachaBtn) {
                    gachaBtn.addEventListener('click', () => {
                        if(this.catalog.length === 0) return;
                        // Emulate a pull mechanic
                        const randomIndex = Math.floor(Math.random() * this.catalog.length);
                        this.lightbox.open(this.catalog[randomIndex]);
                    });
                }
            }
        }

        // --- BOOT SEQUENCE ---
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize the void background
            new VoidEngine('void-canvas');
            // Initialize the gallery with our injected mock data
            new GalleryController(MOCK_CATALOG);
        });

    </script>
</body>
</html>
