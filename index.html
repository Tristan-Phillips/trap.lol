<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Tristan Phillips</title>
  <meta name="description" id="page-desc" content="" />
  <meta property="og:title" id="og-title" content="Tristan Phillips" />
  <meta property="og:description" id="og-desc" content="" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f0f0f'/%3E%3Ccircle cx='16' cy='16' r='7' fill='none' stroke='%23555' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='2.5' fill='%23555'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/pf/style.css" />
</head>
<body>

  <!-- if you are reading this: /whistle/sisyphus/ -->

  <!-- Quote tattoo — barely visible background scripture -->
  <div id="quote-tattoo" aria-hidden="true"></div>

  <!-- Glitch overlay — activated on successful knock -->
  <div id="glitch-veil" aria-hidden="true">
    <div class="gv__scanlines"></div>
    <div class="gv__bleed"></div>
    <div class="gv__signal">SIGNAL ACQUIRED</div>
  </div>

  <!-- Passphrase gate — hidden until knock triggers it -->
  <div id="knock-gate" aria-hidden="true" role="dialog" aria-label="Authentication">
    <div id="knock-gate__inner">
      <label for="knock-input" class="knock-gate__label">—</label>
      <input
        id="knock-input"
        type="password"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="passphrase"
        aria-label="Enter passphrase"
      />
      <span id="knock-err" aria-live="polite"></span>
    </div>
  </div>

  <main class="pf">
    <div class="pf__card">

      <div class="pf__avatar-ring" aria-hidden="true">
        <div class="pf__avatar-glow"></div>
        <div class="pf__avatar">
          <img class="pf__avatar-img" src="/whistle/img/pp.png" alt="" />
        </div>
      </div>

      <h1 class="pf__name" id="pf-name"></h1>
      <p class="pf__title" id="pf-title"></p>
      <p class="pf__bio" id="pf-bio"></p>
      <nav class="pf__links" id="pf-links" aria-label="External profiles"></nav>

    </div>
  </main>

  <footer class="pf-footer" id="pf-footer">
    <span id="pf-copy"></span>
  </footer>

  <script>
    // ── Icon map (no external dep) ────────────────────────────
    const ICONS = {
      github:   `<svg class="pf__link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>`,
      forgejo:  `<svg class="pf__link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="6" cy="6" r="2"/><circle cx="6" cy="18" r="2"/><circle cx="18" cy="9" r="2"/><line x1="6" y1="8" x2="6" y2="16"/><path d="M6 8a6 6 0 0 0 6 6h2"/></svg>`,
      youtube:  `<svg class="pf__link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="6" width="20" height="14" rx="3"/><polygon points="10,10 16,13 10,16" fill="currentColor" stroke="none"/></svg>`,
      image:    `<svg class="pf__link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/><polyline points="21 15 16 10 5 21"/></svg>`,
      telegram: `<svg class="pf__link-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2" fill="none"/></svg>`
    };

    // ── Boot: fetch global.json, render identity ──────────────
    fetch('/whistle/data/global.json')
      .then(r => r.json())
      .then(g => {
        const year = new Date().getFullYear();
        document.getElementById('pf-name').textContent  = g.name  || '';
        document.getElementById('pf-title').textContent = g.title || '';
        document.getElementById('pf-bio').textContent   = g.bio   || '';
        document.getElementById('pf-copy').textContent  = `© ${year} ${g.copyright || g.name || ''}`;
        document.getElementById('page-title').textContent = g.name || '';
        document.getElementById('og-title').content       = g.name || '';
        document.getElementById('page-desc').content      = g.bio  || '';
        document.getElementById('og-desc').content        = g.bio  || '';

        const $nav = document.getElementById('pf-links');
        (g.links || []).forEach(link => {
          const a = document.createElement('a');
          a.href = link.url;
          const isCircle = link.style === 'circle';
          a.className = 'pf__link' + (isCircle ? ' pf__link--circle' : '');
          if (link.external) { a.target = '_blank'; a.rel = 'noopener'; }
          if (isCircle) {
            a.title = link.label;
            a.setAttribute('aria-label', link.label);
            a.innerHTML = ICONS[link.icon] || '';
          } else {
            a.innerHTML = (ICONS[link.icon] || '') + link.label;
          }
          $nav.appendChild(a);
        });
      })
      .catch(() => {
        document.getElementById('pf-copy').textContent = '© ' + new Date().getFullYear();
      });

    // ── Knock system ──────────────────────────────────────────────
    const PHRASE_HASH  = '03331f71dcf83f417134f6c19ac2ef4615fd1a715989e518111b7a9cdad4ece9';
    const PHRASE_HASH2 = '445be54d48a2e6294369c84c61cd0929209d4e1084536159bdf7002bddfe094b';
    const SEQ          = 'spice';
    const SEQ2         = 'void';
    const HUB          = '/hub/';
    const HIDDEN       = '/whistle/void/';

    // SHA-256 via SubtleCrypto (no deps)
    async function sha256(str) {
      const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // ── Gate UI ───────────────────────────────────────────────────
    const $gate  = document.getElementById('knock-gate');
    const $input = document.getElementById('knock-input');
    const $err   = document.getElementById('knock-err');
    const $veil  = document.getElementById('glitch-veil');
    const $name  = document.getElementById('pf-name');

    let gateOpen = false;

    function openGate() {
      if (gateOpen) return;
      gateOpen = true;
      $gate.classList.add('knock-gate--visible');
      $gate.removeAttribute('aria-hidden');
      requestAnimationFrame(() => $input.focus());
    }

    function closeGate() {
      gateOpen = false;
      $gate.classList.remove('knock-gate--visible');
      $gate.setAttribute('aria-hidden', 'true');
      $input.value = '';
      $err.textContent = '';
    }

    // ── Glitch transition → redirect ──────────────────────────────
    const GLITCH_CHARS = 'TR4P//S1GN4L_B34CH//V01D//UPL1NK//';

    function corruptText(el, finalText, duration, cb) {
      const len = finalText.length;
      const start = Date.now();
      const tick = () => {
        const progress = Math.min((Date.now() - start) / duration, 1);
        const stable   = Math.floor(progress * len);
        let out = '';
        for (let i = 0; i < len; i++) {
          if (i < stable) {
            out += finalText[i];
          } else {
            out += GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)];
          }
        }
        el.textContent = out;
        if (progress < 1) requestAnimationFrame(tick);
        else if (cb) cb();
      };
      requestAnimationFrame(tick);
    }

    function triggerGlitch() {
      closeGate();
      $veil.classList.add('gv--active');
      corruptText($name, 'TR4P // S1GN4L', 600, () => {
        setTimeout(() => { window.location.href = HUB; }, 500);
      });
    }

    function triggerVoid() {
      closeGate();
      document.body.style.transition = 'opacity 1.8s ease';
      document.body.style.opacity = '0';
      setTimeout(() => { window.location.href = HIDDEN; }, 1900);
    }

    // ── Passphrase validation ─────────────────────────────────────
    $input.addEventListener('keydown', async (e) => {
      if (e.key !== 'Enter') return;
      const val = $input.value.trim().toLowerCase().replace(/\s+/g, '');
      if (!val) return;
      const hash = await sha256(val);
      if (hash === PHRASE_HASH) {
        triggerGlitch();
      } else if (hash === PHRASE_HASH2) {
        triggerVoid();
      } else {
        $err.textContent = 'denied.';
        $input.value = '';
        $input.classList.add('knock-input--shake');
        setTimeout(() => {
          $input.classList.remove('knock-input--shake');
          $err.textContent = '';
        }, 700);
      }
    });

    // Close gate on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && gateOpen) closeGate();
    });

    // ── Desktop: type 'spice' or 'void' silently ─────────────────
    let seqBuf = '';
    let seqTimer;
    const SEQ_MAX = Math.max(SEQ.length, SEQ2.length);

    document.addEventListener('keydown', (e) => {
      if (gateOpen) return;
      if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      if (!/^[a-z]$/i.test(e.key)) return;

      seqBuf += e.key.toLowerCase();
      clearTimeout(seqTimer);

      if (seqBuf.endsWith(SEQ2)) {
        seqBuf = '';
        openGate();
        return;
      }

      if (seqBuf.endsWith(SEQ)) {
        seqBuf = '';
        openGate();
        return;
      }

      if (seqBuf.length > SEQ_MAX) seqBuf = seqBuf.slice(-SEQ_MAX);

      seqTimer = setTimeout(() => { seqBuf = ''; }, 3000);
    });

    // ── Mobile: tap footer 5× within 3s ──────────────────────────
    const $footer = document.getElementById('pf-footer');
    let tapCount = 0;
    let tapTimer;

    $footer.addEventListener('click', () => {
      tapCount++;
      clearTimeout(tapTimer);
      if (tapCount >= 5) {
        tapCount = 0;
        openGate();
        return;
      }
      tapTimer = setTimeout(() => { tapCount = 0; }, 3000);
    });

    // ── Quote tattoo ──────────────────────────────────────────────
    fetch('/whistle/data/quotes.json')
      .then(r => r.json())
      .then(({ quotes }) => {
        if (!quotes || !quotes.length) return;
        const el = document.getElementById('quote-tattoo');

        // Grid-based placement — divides viewport into rows,
        // shuffles quotes into slots so lines never stack on each other.
        const lineH   = 22;   // px per row (~0.62rem * 1.5 * 16 + breathing)
        const rows    = Math.floor(window.innerHeight / lineH);
        const shuffled = quotes.slice().sort(() => Math.random() - 0.5);

        // One quote per row, left offset randomised per row
        const count = Math.min(shuffled.length, rows);
        for (let i = 0; i < count; i++) {
          const span = document.createElement('span');
          span.textContent = shuffled[i].text;

          const topPx  = i * lineH + Math.random() * (lineH * 0.4);
          const leftPct = -4 + Math.random() * 60; // never flush right so text runs off cleanly
          const fade   = 0.012 + Math.random() * 0.013; // 1.2% – 2.5% max

          span.style.cssText = `top:${topPx}px;left:${leftPct}%;opacity:${fade};`;
          el.appendChild(span);
        }
      })
      .catch(() => {});
  </script>

</body>
</html>
