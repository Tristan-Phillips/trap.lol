<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tristan Phillips</title>
  <meta name="description" content="Software engineer. Systems, infrastructure, and tooling." />
  <meta property="og:title" content="Tristan Phillips" />
  <meta property="og:description" content="Software engineer. Systems, infrastructure, and tooling." />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f0f0f'/%3E%3Ccircle cx='16' cy='16' r='7' fill='none' stroke='%23555' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='2.5' fill='%23555'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/pf/style.css" />
</head>
<body>

  <!-- Glitch overlay — activated on successful knock -->
  <div id="glitch-veil" aria-hidden="true">
    <div class="gv__scanlines"></div>
    <div class="gv__bleed"></div>
    <div class="gv__signal">SIGNAL ACQUIRED</div>
  </div>

  <!-- Passphrase gate — hidden until knock triggers it -->
  <div id="knock-gate" aria-hidden="true" role="dialog" aria-label="Authentication">
    <div id="knock-gate__inner">
      <label for="knock-input" class="knock-gate__label">—</label>
      <input
        id="knock-input"
        type="password"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="passphrase"
        aria-label="Enter passphrase"
      />
      <span id="knock-err" aria-live="polite"></span>
    </div>
  </div>

  <main class="pf">
    <div class="pf__card">

      <div class="pf__avatar" aria-hidden="true">
        <span class="pf__avatar-glyph">TP</span>
      </div>

      <h1 class="pf__name" id="pf-name">Tristan Phillips</h1>
      <p class="pf__title">Software Engineer</p>
      <p class="pf__bio">Systems, infrastructure, and tooling.</p>

      <nav class="pf__links" aria-label="External profiles">
        <a href="https://github.com/Tristan-Phillips" target="_blank" rel="noopener" class="pf__link">
          <svg class="pf__link-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 2C6.477 2 2 6.484 2 12.021c0 4.428 2.865 8.185 6.839 9.504.5.092.682-.217.682-.483 0-.237-.009-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482C19.138 20.2 22 16.447 22 12.021 22 6.484 17.523 2 12 2z"/>
          </svg>
          GitHub
        </a>
        <a href="https://www.youtube.com/@tphips" target="_blank" rel="noopener" class="pf__link">
          <svg class="pf__link-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
          </svg>
          YouTube
        </a>
      </nav>

    </div>
  </main>

  <footer class="pf-footer" id="pf-footer">
    <span id="pf-copy">&copy; <span id="pf-year"></span> Tristan Phillips</span>
  </footer>

  <script>
    document.getElementById('pf-year').textContent = new Date().getFullYear();

    // ── Knock system ──────────────────────────────────────────────
    const PHRASE_HASH = '03331f71dcf83f417134f6c19ac2ef4615fd1a715989e518111b7a9cdad4ece9';
    const SEQ         = 'spice';
    const HUB         = '/hub/';

    // SHA-256 via SubtleCrypto (no deps)
    async function sha256(str) {
      const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // ── Gate UI ───────────────────────────────────────────────────
    const $gate  = document.getElementById('knock-gate');
    const $input = document.getElementById('knock-input');
    const $err   = document.getElementById('knock-err');
    const $veil  = document.getElementById('glitch-veil');
    const $name  = document.getElementById('pf-name');

    let gateOpen = false;

    function openGate() {
      if (gateOpen) return;
      gateOpen = true;
      $gate.classList.add('knock-gate--visible');
      $gate.removeAttribute('aria-hidden');
      requestAnimationFrame(() => $input.focus());
    }

    function closeGate() {
      gateOpen = false;
      $gate.classList.remove('knock-gate--visible');
      $gate.setAttribute('aria-hidden', 'true');
      $input.value = '';
      $err.textContent = '';
    }

    // ── Glitch transition → redirect ──────────────────────────────
    const GLITCH_CHARS = 'TR4P//S1GN4L_B34CH//V01D//UPL1NK//';

    function corruptText(el, finalText, duration, cb) {
      const len = finalText.length;
      const start = Date.now();
      const tick = () => {
        const progress = Math.min((Date.now() - start) / duration, 1);
        const stable   = Math.floor(progress * len);
        let out = '';
        for (let i = 0; i < len; i++) {
          if (i < stable) {
            out += finalText[i];
          } else {
            out += GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)];
          }
        }
        el.textContent = out;
        if (progress < 1) requestAnimationFrame(tick);
        else if (cb) cb();
      };
      requestAnimationFrame(tick);
    }

    function triggerGlitch() {
      closeGate();
      $veil.classList.add('gv--active');
      corruptText($name, 'TR4P // S1GN4L', 600, () => {
        setTimeout(() => { window.location.href = HUB; }, 500);
      });
    }

    // ── Passphrase validation ─────────────────────────────────────
    $input.addEventListener('keydown', async (e) => {
      if (e.key !== 'Enter') return;
      const val = $input.value.trim().toLowerCase().replace(/\s+/g, '');
      if (!val) return;
      const hash = await sha256(val);
      if (hash === PHRASE_HASH) {
        triggerGlitch();
      } else {
        $err.textContent = 'denied.';
        $input.value = '';
        $input.classList.add('knock-input--shake');
        setTimeout(() => {
          $input.classList.remove('knock-input--shake');
          $err.textContent = '';
        }, 700);
      }
    });

    // Close gate on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && gateOpen) closeGate();
    });

    // ── Desktop: type 'spice' silently ────────────────────────────
    let seqBuf = '';
    let seqTimer;

    document.addEventListener('keydown', (e) => {
      if (gateOpen) return;
      if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      if (!/^[a-z]$/i.test(e.key)) return;

      seqBuf += e.key.toLowerCase();
      clearTimeout(seqTimer);

      if (seqBuf.endsWith(SEQ)) {
        seqBuf = '';
        openGate();
        return;
      }

      // Trim buffer — keep only the last N chars needed
      if (seqBuf.length > SEQ.length) seqBuf = seqBuf.slice(-SEQ.length);

      seqTimer = setTimeout(() => { seqBuf = ''; }, 3000);
    });

    // ── Mobile: tap footer 5× within 3s ──────────────────────────
    const $footer = document.getElementById('pf-footer');
    let tapCount = 0;
    let tapTimer;

    $footer.addEventListener('click', () => {
      tapCount++;
      clearTimeout(tapTimer);
      if (tapCount >= 5) {
        tapCount = 0;
        openGate();
        return;
      }
      tapTimer = setTimeout(() => { tapCount = 0; }, 3000);
    });
  </script>

</body>
</html>
