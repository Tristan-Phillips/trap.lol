<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADAR // ANOMALY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Rubik+Glitch&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="glass/style/style.css">
</head>
<body>
    <div class="mesh-background"></div>
    <div class="scanlines"></div>
    
    <div id="authOverlay" class="overlay active">
        <div class="auth-box">
            <h2 class="glitch-text" data-text="ACCESS RESTRICTED">ACCESS RESTRICTED</h2>
            <p class="sultry-text">Insert the keys. Open the gateway.</p>
            
            <div class="input-group">
                <label>PROXY SECRET (radar.trap.lol)</label>
                <input type="password" id="proxyKeyInput" placeholder="••••••••••••" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>TORBOX PRO API KEY</label>
                <input type="password" id="torboxKeyInput" placeholder="••••••••••••" autocomplete="off">
            </div>
            
            <button id="authBtn" class="chaotic-btn">ESTABLISH UPLINK</button>
            <p class="warning-text">Keys reside in volatile memory. Close the tab, and it all burns.</p>
        </div>
    </div>

    <div id="mainInterface" class="hidden">
        <header class="chaos-header">
            <div class="graffiti-accent">X</div>
            <h1>[ RADAR // ANOMALY ]</h1>
            <p class="subtitle">Scour the void. Ignite the cache.</p>
            
            <div class="search-matrix">
                <input type="text" id="searchInput" placeholder="ENTER TARGET DESIGNATION..." autocomplete="off">
                <button id="searchBtn" class="chaotic-btn">HUNT</button>
                <button id="vaultBtn" class="chaotic-btn alt-btn">STRIP VAULT</button>
            </div>
        </header>

        <section class="control-deck">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">ALL</button>
                <button class="filter-btn" data-filter="cached">CACHED READY</button>
                <button class="filter-btn" data-filter="4k">2160p / 4K</button>
                <button class="filter-btn" data-filter="1080p">1080p</button>
            </div>
            <div class="sort-matrix">
                <select id="sortSelect">
                    <option value="seeders">Swarm Health (High to Low)</option>
                    <option value="size">Mass (Large to Small)</option>
                    <option value="quality">Fidelity (High to Low)</option>
                </select>
            </div>
        </section>

        <main id="resultsGrid" class="results-grid"></main>
    </div>

    <script src="glass/script/app.js"></script>
</body>
</html>
