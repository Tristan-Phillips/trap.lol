<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>void // trap.lol</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2306040A'/%3E%3Ccircle cx='16' cy='16' r='7' fill='none' stroke='%23BE29EC' stroke-width='1' opacity='0.3'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/playground/void/assets/style/style.css" />
</head>
<body>

  <canvas id="field" aria-hidden="true"></canvas>

  <header class="v-header" aria-hidden="true">
    <span class="v-header__label">VOID //</span>
    <span class="v-header__sub">personal transmission log</span>
  </header>

  <main id="feed" role="list" aria-label="Void entries"></main>

  <!-- Full entry — the well -->
  <div id="well" hidden aria-modal="true" role="dialog">
    <div id="well-veil"></div>
    <div id="well-doc">
      <div id="well-close-row">
        <button id="well-close" aria-label="Close entry">
          <span class="v-close-icon" aria-hidden="true"></span>
          <span class="v-close-text">close</span>
        </button>
      </div>
      <div id="well-inner"></div>
    </div>
  </div>

  <!-- Return sigil -->
  <a href="/" id="uplink-node" class="uplink-node" aria-label="Return to trap.lol">
    <span class="uplink-node__sigil" aria-hidden="true">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.45"/>
        <circle cx="12" cy="12" r="3.5" fill="currentColor"/>
      </svg>
      <span class="uplink-node__drain" aria-hidden="true"></span>
    </span>
    <span class="uplink-node__label">uplink</span>
  </a>

  <script src="https://cdn.trap.lol/shards/purify.min.js"></script>
  <script src="https://cdn.trap.lol/shards/marked.min.js"></script>
  <script src="/playground/void/assets/script/app.js" type="module"></script>
  <script>
    document.getElementById('uplink-node').addEventListener('click', function(e) {
      e.preventDefault();
      this.classList.add('uplink-node--firing');
      setTimeout(() => { window.location.href = '/'; }, 310);
    });
  </script>

</body>
</html>
