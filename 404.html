<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>trap.lol // 404</title>
    <meta name="description" content="The path you requested does not exist within this system." />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2306040A'/%3E%3Ccircle cx='16' cy='16' r='7' fill='none' stroke='%23BE29EC' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23BE29EC'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/hub/glass/style/style.css" />
    <style>
      /* ── Chaos orbs — always drifting, never still ── */
      .nr-orb {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        filter: blur(60px);
        z-index: 0;
      }
      .nr-orb--1 {
        width: 520px; height: 380px;
        top: -10%; left: -8%;
        background: radial-gradient(ellipse, rgba(0, 240, 255, 0.11) 0%, transparent 70%);
        animation: orb-drift-1 18s ease-in-out infinite alternate;
      }
      .nr-orb--2 {
        width: 400px; height: 500px;
        bottom: -15%; right: -5%;
        background: radial-gradient(ellipse, rgba(190, 41, 236, 0.13) 0%, transparent 70%);
        animation: orb-drift-2 22s ease-in-out infinite alternate;
      }
      .nr-orb--3 {
        width: 260px; height: 260px;
        top: 40%; left: 55%;
        background: radial-gradient(ellipse, rgba(139, 92, 246, 0.09) 0%, transparent 70%);
        animation: orb-drift-3 14s ease-in-out infinite alternate;
      }
      @keyframes orb-drift-1 {
        from { transform: translate(0, 0) scale(1); }
        to   { transform: translate(40px, 60px) scale(1.08); }
      }
      @keyframes orb-drift-2 {
        from { transform: translate(0, 0) scale(1); }
        to   { transform: translate(-50px, -40px) scale(1.05); }
      }
      @keyframes orb-drift-3 {
        from { transform: translate(0, 0) scale(1); }
        to   { transform: translate(25px, -35px) scale(0.9); }
      }

      /* ── Layout ── */
      main {
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        min-height: calc(100vh - 120px);
        padding: var(--space-xl) 0 var(--space-lg);
        position: relative;
        z-index: 1;
      }

      .null-route {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0;
        max-width: 560px;
        position: relative;
      }

      /* ── Eyebrow ── */
      .null-route__eyebrow {
        font-family: var(--font-mono);
        font-size: 0.58rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(0, 240, 255, 0.45);
        margin-bottom: 0.5rem;
      }

      /* ── 404 — the centrepiece ── */
      .null-route__code {
        font-family: var(--font-mono);
        font-size: clamp(5.5rem, 20vw, 10rem);
        font-weight: 700;
        line-height: 0.85;
        letter-spacing: -0.04em;
        color: #00f0ff;
        text-shadow:
          0 0 20px rgba(0, 240, 255, 0.9),
          0 0 55px rgba(0, 240, 255, 0.4),
          0 0 120px rgba(0, 240, 255, 0.15),
          0 0 1px rgba(190, 41, 236, 0.8);
        user-select: none;
        animation: glitch 9s steps(1) infinite;
        position: relative;
        z-index: 1;
      }
      /* ghost layer for the cyan/magenta split glitch */
      .null-route__code::before,
      .null-route__code::after {
        content: '404';
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
      }
      .null-route__code::before {
        color: rgba(190, 41, 236, 0.8);
        text-shadow: none;
        animation: glitch-ghost-a 9s steps(1) infinite;
      }
      .null-route__code::after {
        color: rgba(0, 240, 255, 0.6);
        text-shadow: none;
        animation: glitch-ghost-b 9s steps(1) infinite;
      }

      @keyframes glitch {
        0%, 88%, 100% { clip-path: none; transform: none; }
        89%  { clip-path: inset(0 0 75% 0); transform: translateX(-4px); }
        90%  { clip-path: inset(55% 0 0 0);  transform: translateX(4px); }
        91%  { clip-path: none; transform: none; }
        93%  { clip-path: inset(25% 0 45% 0); transform: translateX(-3px) skewX(-1deg); }
        94%  { clip-path: none; transform: none; }
      }
      @keyframes glitch-ghost-a {
        0%, 88%, 100% { opacity: 0; transform: none; clip-path: none; }
        89%  { opacity: 1; clip-path: inset(10% 0 60% 0); transform: translateX(6px); }
        90%  { opacity: 0; }
        93%  { opacity: 1; clip-path: inset(65% 0 5% 0);  transform: translateX(-5px); }
        94%  { opacity: 0; }
      }
      @keyframes glitch-ghost-b {
        0%, 88%, 100% { opacity: 0; transform: none; clip-path: none; }
        89%  { opacity: 1; clip-path: inset(55% 0 10% 0); transform: translateX(-6px); }
        90%  { opacity: 0; }
        93%  { opacity: 1; clip-path: inset(5% 0 70% 0);  transform: translateX(5px); }
        94%  { opacity: 0; }
      }

      /* ── Status line ── */
      .null-route__status {
        font-family: var(--font-mono);
        font-size: var(--text-xs);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-top: 0.6rem;
        margin-bottom: var(--space-md);
        display: flex;
        align-items: center;
        gap: 0.55rem;
      }
      .null-route__status::before {
        content: '';
        display: inline-block;
        width: 5px; height: 5px;
        border-radius: 50%;
        background: #00f0ff;
        box-shadow: 0 0 8px rgba(0, 240, 255, 0.9), 0 0 18px rgba(0, 240, 255, 0.4);
        flex-shrink: 0;
        animation: spark 2.4s ease-in-out infinite;
      }
      @keyframes spark {
        0%, 100% { opacity: 1;   box-shadow: 0 0 8px rgba(0,240,255,0.9), 0 0 18px rgba(0,240,255,0.4); }
        40%       { opacity: 0.15; box-shadow: none; }
        55%       { opacity: 1;   box-shadow: 0 0 12px rgba(0,240,255,1),  0 0 28px rgba(0,240,255,0.5); }
        70%       { opacity: 0.5; }
      }

      /* ── Diagnostic card ── */
      .null-route__card {
        width: 100%;
        background: rgba(4, 2, 10, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(0, 240, 255, 0.12);
        border-radius: 6px;
        padding: 1.4rem 1.75rem;
        margin-bottom: var(--space-md);
        position: relative;
        overflow: hidden;
        animation: card-rise 0.5s cubic-bezier(0.25, 0, 0, 1) both;
      }
      @keyframes card-rise {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      /* cyan spark line left edge */
      .null-route__card::before {
        content: '';
        position: absolute;
        inset: 15% auto 15% 0;
        width: 1px;
        background: linear-gradient(180deg,
          transparent,
          rgba(0, 240, 255, 0.7) 30%,
          rgba(190, 41, 236, 0.5) 70%,
          transparent);
        animation: edge-crawl 3.5s ease-in-out infinite;
      }
      @keyframes edge-crawl {
        0%, 100% { inset: 15% auto 65% 0; opacity: 0.3; }
        50%       { inset: 35% auto 15% 0; opacity: 1; }
      }
      /* subtle horizontal scan inside card */
      .null-route__card::after {
        content: '';
        position: absolute;
        left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg,
          transparent 0%,
          rgba(0, 240, 255, 0.12) 20%,
          rgba(0, 240, 255, 0.25) 50%,
          rgba(0, 240, 255, 0.12) 80%,
          transparent 100%);
        animation: scan-h 5s linear infinite;
        pointer-events: none;
      }
      @keyframes scan-h {
        from { top: 0%; }
        to   { top: 100%; }
      }

      .null-route__label {
        font-family: var(--font-mono);
        font-size: 0.58rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(0, 240, 255, 0.4);
        margin-bottom: 0.8rem;
      }

      .null-route__message {
        font-family: var(--font-mono);
        font-size: var(--text-xs);
        color: var(--text-muted);
        line-height: 1.85;
        margin-bottom: 1.25rem;
      }
      .null-route__message em {
        font-style: normal;
        color: rgba(0, 240, 255, 0.65);
      }

      /* ── KV diagnostics ── */
      .diag-grid {
        display: grid;
        grid-template-columns: minmax(80px, auto) 1fr;
        gap: 0.38rem 1.25rem;
        align-items: baseline;
      }
      .diag-key {
        font-family: var(--font-mono);
        font-size: 0.58rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(190, 41, 236, 0.55);
        white-space: nowrap;
      }
      .diag-val {
        font-family: var(--font-mono);
        font-size: var(--text-xs);
        color: var(--text-muted);
        word-break: break-all;
      }
      .diag-val--dead { color: rgba(0, 240, 255, 0.5); }
      .diag-val--ok   { color: rgba(190, 41, 236, 0.65); }

      /* ── Nav ── */
      .null-route__nav {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        list-style: none;
        margin: 0; padding: 0;
        animation: card-rise 0.5s 0.1s cubic-bezier(0.25, 0, 0, 1) both;
      }
      .null-route__nav-link {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        font-family: var(--font-mono);
        font-size: var(--text-xs);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-muted);
        text-decoration: none;
        padding: 0.45rem 0.9rem;
        border: 1px solid rgba(0, 240, 255, 0.1);
        border-radius: 3px;
        background: rgba(0, 240, 255, 0.03);
        transition:
          color var(--transition),
          border-color var(--transition),
          background var(--transition),
          box-shadow var(--transition),
          gap var(--transition-med);
        min-height: var(--touch-min);
        position: relative;
        overflow: hidden;
      }
      .null-route__nav-link::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, rgba(0,240,255,0.07) 0%, transparent 100%);
        opacity: 0;
        transition: opacity var(--transition);
      }
      .null-route__nav-link:hover {
        color: #00f0ff;
        border-color: rgba(0, 240, 255, 0.35);
        background: rgba(0, 240, 255, 0.05);
        box-shadow: 0 0 18px rgba(0, 240, 255, 0.1), inset 0 0 12px rgba(0, 240, 255, 0.04);
        gap: 0.8rem;
      }
      .null-route__nav-link:hover::before { opacity: 1; }
      .null-route__nav-link svg {
        width: 0.7rem; height: 0.7rem;
        flex-shrink: 0;
        opacity: 0.45;
        transition: opacity var(--transition);
      }
      .null-route__nav-link:hover svg { opacity: 1; }

      @media (max-width: 600px) {
        .null-route__code { font-size: clamp(4.5rem, 24vw, 7rem); }
        .null-route__card { padding: 1.2rem 1.25rem; }
        main { padding: var(--space-lg) 0 var(--space-md); }
      }
      @media (prefers-reduced-motion: reduce) {
        .null-route__code,
        .null-route__code::before,
        .null-route__code::after { animation: none; }
        .null-route__card,
        .null-route__nav { animation: none; opacity: 1; }
        .null-route__status::before,
        .null-route__card::before,
        .null-route__card::after,
        .nr-orb { animation: none; }
      }
    </style>
  </head>
  <body>

    <div class="nr-orb nr-orb--1" aria-hidden="true"></div>
    <div class="nr-orb nr-orb--2" aria-hidden="true"></div>
    <div class="nr-orb nr-orb--3" aria-hidden="true"></div>

    <main>
      <div class="null-route">

        <div class="null-route__eyebrow">trap.lol // null route</div>
        <div class="null-route__code" aria-label="404">404</div>

        <div class="null-route__status" role="status" aria-live="polite">
          whoops. nothing here.
        </div>

        <div class="null-route__card" role="region" aria-label="Diagnostic">
          <div class="null-route__label">// route diagnostic</div>
          <p class="null-route__message">
            that path <em>doesn't exist</em> in this system.<br>
            deleted, moved, or maybe it was never real to begin with.
          </p>
          <div class="diag-grid">
            <span class="diag-key">requested</span>
            <span class="diag-val diag-val--dead" id="diag-path">—</span>
            <span class="diag-key">status</span>
            <span class="diag-val diag-val--dead">404 not found</span>
            <span class="diag-key">host</span>
            <span class="diag-val diag-val--ok">trap.lol</span>
            <span class="diag-key">referrer</span>
            <span class="diag-val" id="diag-referrer">—</span>
          </div>
        </div>

        <ul class="null-route__nav" aria-label="Navigation">
          <li>
            <a href="/" class="null-route__nav-link">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              home
            </a>
          </li>
          <li>
            <a href="javascript:history.back()" class="null-route__nav-link">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
              go back
            </a>
          </li>
        </ul>

      </div>
    </main>

    <footer class="site-footer">
      <div class="site-footer__bar">
        <span>trap.lol</span>
        <span class="site-footer__bar-sep">//</span>
        <span>Assume Breach. Stay Sovereign.</span>
      </div>
    </footer>

    <a id="uplink-node" href="/hub/" class="uplink-node" aria-label="Return to trap.lol hub">
      <span class="uplink-node__sigil" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.45"/>
          <circle cx="12" cy="12" r="3.5" fill="currentColor"/>
        </svg>
        <span class="uplink-node__drain" aria-hidden="true"></span>
      </span>
      <span class="uplink-node__label">uplink</span>
    </a>

    <script>
      (function () {
        var path = window.location.pathname + window.location.search;
        var ref  = document.referrer;
        document.getElementById('diag-path').textContent = path || '—';
        document.getElementById('diag-referrer').textContent = ref
          ? (ref.length > 60 ? ref.slice(0, 57) + '…' : ref)
          : 'none';
        var node = document.getElementById('uplink-node');
        node.addEventListener('click', function (e) {
          e.preventDefault();
          node.classList.add('uplink-node--firing');
          setTimeout(function () { window.location.href = node.getAttribute('href'); }, 310);
        });
      })();
    </script>

  </body>
</html>
