<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>void</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%23000'/%3E%3Ccircle cx='16' cy='16' r='5' fill='none' stroke='%23440018' stroke-width='1'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/void/assets/style/style.css" />
</head>
<body class="void-body">

  <!-- The pressure layers — what lives in the deep -->
  <div class="void-pressure" aria-hidden="true">
    <div class="void-pressure__column void-pressure__column--a"></div>
    <div class="void-pressure__column void-pressure__column--b"></div>
    <div class="void-pressure__column void-pressure__column--c"></div>
    <div class="void-pressure__grain"></div>
    <div class="void-pressure__vignette"></div>
  </div>

  <!-- The wrong thing — occasionally moves when it shouldn't -->
  <div class="void-wrong" id="void-wrong" aria-hidden="true"></div>

  <!-- Custom cursor -->
  <div class="void-cursor" id="void-cursor" aria-hidden="true">
    <div class="void-cursor__dot"></div>
  </div>

  <!-- Feed -->
  <main class="void-feed" id="void-feed">

    <div class="void-surface" aria-hidden="true">
      <span class="void-surface__word">void</span>
    </div>

    <ol class="void-list" id="void-list" role="list"></ol>

  </main>

  <!-- Submersion overlay — full entry -->
  <div class="void-sub" id="void-sub" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="void-sub__water" id="void-sub-water"></div>
    <div class="void-sub__panel" id="void-sub-panel">
      <button class="void-sub__surface" id="void-sub-close" aria-label="Surface — close entry">
        <span>surface</span>
      </button>
      <div class="void-sub__body" id="void-sub-body"></div>
    </div>
  </div>

  <!-- Uplink — bottom left, same pattern as art/ -->
  <a id="uplink-node" href="/" class="uplink-node" aria-label="Return to trap.lol">
    <span class="uplink-node__sigil" aria-hidden="true">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.4"/>
        <circle cx="12" cy="12" r="3.5" fill="currentColor"/>
      </svg>
      <span class="uplink-node__drain" aria-hidden="true"></span>
    </span>
    <span class="uplink-node__label">uplink</span>
  </a>

  <script src="/void/assets/script/app.js" type="module"></script>
  <script>
    (function() {
      var node = document.getElementById('uplink-node');
      node.addEventListener('click', function(e) {
        e.preventDefault();
        node.classList.add('uplink-node--firing');
        setTimeout(function() { window.location.href = '/'; }, 310);
      });
    })();
  </script>
</body>
</html>
