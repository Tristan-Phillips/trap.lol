<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>trap.lol // void</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23010003'/%3E%3Ccircle cx='16' cy='16' r='7' fill='none' stroke='%23590020' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='2.5' fill='%238B0033'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/void/assets/style/style.css" />
</head>
<body class="void-body">

  <!-- Depth layers — the nothing that breathes -->
  <div class="void-depth" aria-hidden="true">
    <div class="void-depth__abyss"></div>
    <div class="void-depth__shape void-depth__shape--a"></div>
    <div class="void-depth__shape void-depth__shape--b"></div>
    <div class="void-depth__shape void-depth__shape--c"></div>
    <div class="void-depth__grain"></div>
    <div class="void-depth__vignette"></div>
    <div class="void-depth__scan"></div>
  </div>

  <!-- Custom cursor -->
  <div id="v-cursor" class="v-cursor" aria-hidden="true"></div>

  <!-- Feed -->
  <main class="void-feed" id="void-feed" aria-label="Void entries">
    <header class="void-header" aria-hidden="true">
      <div class="void-header__letters">
        <span class="void-header__word">V</span><span class="void-header__word">O</span><span class="void-header__word">I</span><span class="void-header__word">D</span>
      </div>
      <span class="void-header__sub">transmissions from the deep</span>
    </header>
    <div class="void-feed__entries" id="void-entries" role="list"></div>
  </main>

  <!-- Spotlight overlay -->
  <div id="void-spotlight" class="void-spotlight" role="dialog" aria-modal="true" aria-label="Entry" hidden>
    <div class="void-spotlight__curtain" id="void-curtain"></div>
    <div class="void-spotlight__panel" id="void-panel">
      <button class="void-spotlight__esc" id="void-esc" aria-label="Close">
        <span class="void-spotlight__esc-line"></span>
        <span class="void-spotlight__esc-line"></span>
      </button>
      <div class="void-spotlight__scroll">
        <div class="void-spotlight__content" id="void-spotlight-content"></div>
      </div>
    </div>
  </div>

  <!-- Uplink node — bottom left, same pattern as art/ -->
  <a id="uplink-node" href="/" class="uplink-node" aria-label="Return to trap.lol hub">
    <span class="uplink-node__sigil" aria-hidden="true">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.45"/>
        <circle cx="12" cy="12" r="3.5" fill="currentColor"/>
      </svg>
      <span class="uplink-node__drain" aria-hidden="true"></span>
    </span>
    <span class="uplink-node__label">uplink</span>
  </a>

  <script src="/void/assets/script/app.js" type="module"></script>
  <script>
    (function() {
      const node = document.getElementById('uplink-node');
      node.addEventListener('click', function(e) {
        e.preventDefault();
        const href = node.getAttribute('href');
        node.classList.add('uplink-node--firing');
        setTimeout(function() { window.location.href = href; }, 310);
      });
    })();
  </script>
</body>
</html>
