<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>trap.lol // echoes</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2306040A'/%3E%3Ccircle cx='16' cy='16' r='7' fill='none' stroke='%23BE29EC' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23BE29EC'/%3E%3C/svg%3E" />
    <meta name="description" content="Echoes — fragments of a mind that refuses to stay quiet." />
    <link rel="stylesheet" href="assets/style/style.css" />
  </head>
  <body>

    <div id="cursor-orb" class="cursor-orb" aria-hidden="true"></div>
    <canvas id="particle-canvas" class="particle-canvas" aria-hidden="true"></canvas>

    <header class="art-header">
      <a href="/hub/" class="back-link" aria-label="Back to trap.lol">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
      </a>
      <div class="art-header__inner">
        <div id="art-eyebrow" class="art-header__eyebrow"></div>
        <h1 id="art-title" class="art-header__title"></h1>
        <p id="art-subtitle" class="art-header__subtitle"></p>
      </div>
      <div class="art-header__controls" role="group" aria-label="Filter by medium">
        <button id="filter-all" class="filter-btn active" data-filter="all" title="All works" aria-pressed="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
        </button>
        <button id="filter-analog" class="filter-btn" data-filter="traditional" title="Traditional works" aria-pressed="false">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
        </button>
        <button id="filter-digital" class="filter-btn" data-filter="digital" title="Digital works" aria-pressed="false">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg>
        </button>
        <button id="filter-nsfw" class="filter-btn filter-btn--nsfw" data-filter="nsfw" title="Sensitive works — 18+" aria-pressed="false">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </header>

    <main id="art-grid" class="art-grid" aria-label="Art gallery"></main>

    <!-- ── Selection Panel ── -->
    <aside id="sel-panel" class="sel-panel" aria-label="Selected artworks" hidden>
      <div class="sel-panel__header">
        <span class="sel-panel__title">SELECTED</span>
        <span class="sel-panel__count" id="sel-count">0</span>
        <button class="sel-panel__clear" id="sel-clear" title="Clear selection" aria-label="Clear all">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <ul class="sel-panel__list" id="sel-list"></ul>
      <div class="sel-panel__footer">
        <button class="sel-panel__copy" id="sel-copy" aria-label="Copy all IDs">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
          <span id="sel-copy-label">Copy IDs</span>
        </button>
      </div>
    </aside>

    <div id="lightbox" class="lightbox hidden" role="dialog" aria-modal="true" aria-label="Artwork viewer" aria-hidden="true">
      <div class="lightbox__inner">
        <button class="lightbox__close" id="lb-close" aria-label="Close viewer">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <div class="lightbox__image-wrap" id="lb-wrap">
          <div class="lb-viewport" id="lb-viewport">
            <img id="lb-img" class="lightbox__image" src="" alt="" loading="lazy" draggable="false" />
          </div>
          <div class="lightbox__img-overlay" aria-hidden="true"></div>
          <button class="lightbox__nav lightbox__nav--prev" id="lb-prev" aria-label="Previous artwork">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
          </button>
          <button class="lightbox__nav lightbox__nav--next" id="lb-next" aria-label="Next artwork">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </button>

          <!-- Image manipulation toolbar -->
          <div class="lb-toolbar" id="lb-toolbar" role="toolbar" aria-label="Image controls">
            <div class="lb-toolbar__group">
              <button class="lb-tool" id="lbt-zoom-out" aria-label="Zoom out" title="Zoom out  [ − ]">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
              </button>
              <span class="lb-tool__zoom-label" id="lbt-zoom-pct" aria-live="polite">100%</span>
              <button class="lb-tool" id="lbt-zoom-in" aria-label="Zoom in" title="Zoom in  [ + ]">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
              </button>
            </div>
            <span class="lb-toolbar__sep" aria-hidden="true"></span>
            <div class="lb-toolbar__group">
              <button class="lb-tool" id="lbt-rot-ccw" aria-label="Rotate counter-clockwise" title="Rotate CCW  [ Q ]">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
              </button>
              <button class="lb-tool" id="lbt-rot-cw" aria-label="Rotate clockwise" title="Rotate CW  [ E ]">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
              </button>
            </div>
            <span class="lb-toolbar__sep" aria-hidden="true"></span>
            <div class="lb-toolbar__group">
              <button class="lb-tool" id="lbt-flip-h" aria-label="Flip horizontal" title="Flip horizontal  [ H ]">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h3"/><path d="M16 3h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-3"/><line x1="12" y1="20" x2="12" y2="4"/></svg>
              </button>
              <button class="lb-tool" id="lbt-flip-v" aria-label="Flip vertical" title="Flip vertical  [ V ]">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 8V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v3"/><path d="M21 16v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-3"/><line x1="4" y1="12" x2="20" y2="12"/></svg>
              </button>
            </div>
            <span class="lb-toolbar__sep" aria-hidden="true"></span>
            <div class="lb-toolbar__group">
              <button class="lb-tool lb-tool--fit" id="lbt-fit" aria-label="Toggle fit / fill" title="Fit / Fill  [ F ]">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
              </button>
              <button class="lb-tool lb-tool--reset" id="lbt-reset" aria-label="Reset view" title="Reset  [ 0 ]  or double-click">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
              </button>
            </div>
          </div>

          <!-- Zoom hint — fades in briefly when zoom changes -->
          <div class="lb-zoom-toast" id="lb-zoom-toast" aria-hidden="true"></div>
        </div>
        <button class="lb-panel-toggle" id="lb-panel-toggle" aria-label="Show info panel" title="Info panel  [ I ]">
          <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
        </button>
        <aside class="lightbox__panel" id="lb-panel">
          <div class="lightbox__panel-tags" id="lb-tags"></div>
          <div class="lightbox__panel-medium" id="lb-medium"></div>
          <div class="lightbox__panel-desc" id="lb-desc"></div>
          <div class="lightbox__panel-verse" id="lb-verse"></div>
          <div class="lightbox__panel-stats" id="lb-stats"></div>
          <a id="lb-download" class="lightbox__download" href="#" target="_blank" rel="noopener noreferrer" aria-label="Open full image in new tab">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </a>
        </aside>
      </div>
    </div>

    <footer class="art-footer">
      <span class="art-footer__copy">© 2026 trap.lol</span>
      <span class="art-footer__sep">//</span>
      <span class="art-footer__tagline">feel everything. regret nothing.</span>
      <span class="art-footer__signal">[ ECHOES ONLINE ]</span>
    </footer>

    <script type="module" src="assets/script/app.js"></script>

    <!-- ── Uplink Home Node ── -->
    <a id="uplink-node" href="/hub/" class="uplink-node" aria-label="Return to trap.lol hub">
      <span class="uplink-node__sigil" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.45"/>
          <circle cx="12" cy="12" r="3.5" fill="currentColor"/>
        </svg>
        <span class="uplink-node__drain" aria-hidden="true"></span>
      </span>
      <span class="uplink-node__label">uplink</span>
    </a>
    <script>
      (function() {
        const node = document.getElementById('uplink-node');
        node.addEventListener('click', function(e) {
          e.preventDefault();
          const href = node.getAttribute('href');
          node.classList.add('uplink-node--firing');
          setTimeout(function() { window.location.href = href; }, 310);
        });
      })();
    </script>
  </body>
</html>
