<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>trap.lol // observations</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2306040A'/%3E%3Ccircle cx='16' cy='16' r='7' fill='none' stroke='%23BE29EC' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23BE29EC'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/hub/glass/style/style.css" />
    <style>
      /* ══════════════════════════════════════════════════
         OBSERVATIONS — Cognitive Profile Terminal
         trap.lol × psych record × living document
         ══════════════════════════════════════════════════ */

      /* ── Nav ── */
      .back-nav {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-family: var(--font-mono);
        font-size: var(--text-xs);
        color: var(--text-muted);
        text-decoration: none;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition: color var(--transition), gap var(--transition-med);
        margin-bottom: var(--space-md);
      }
      .back-nav:hover { color: var(--accent-warm); gap: 0.65rem; }
      .back-nav svg { width: 0.75rem; height: 0.75rem; flex-shrink: 0; }

      /* ── Loading / error states ── */
      .obs-loading {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: var(--space-lg) 0;
        font-family: var(--font-mono);
        font-size: var(--text-xs);
        color: var(--text-muted);
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .loading-dot {
        width: 5px; height: 5px;
        border-radius: 50%;
        background: var(--accent);
        animation: pulse-dot 1.2s ease-in-out infinite;
      }
      .loading-dot:nth-child(2) { animation-delay: 0.2s; }
      .loading-dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes pulse-dot {
        0%, 80%, 100% { opacity: 0.2; transform: scale(0.85); }
        40% { opacity: 1; transform: scale(1); }
      }
      .obs-error {
        font-family: var(--font-mono);
        font-size: var(--text-sm);
        color: #ef4444;
        padding: var(--space-md);
        border: 1px solid rgba(239,68,68,0.25);
        background: rgba(239,68,68,0.05);
        border-radius: 6px;
      }
      .hidden { display: none !important; }

      /* ── Tab bar ── */
      .obs-tabs {
        display: flex;
        gap: 0.25rem;
        margin-bottom: var(--space-lg);
        flex-wrap: wrap;
        border-bottom: 1px solid var(--glass-border-mute);
        padding-bottom: 0;
      }
      .obs-tab {
        font-family: var(--font-mono);
        font-size: var(--text-xs);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-muted);
        background: none;
        border: 1px solid transparent;
        border-bottom: none;
        border-radius: 4px 4px 0 0;
        padding: 0.45rem 0.9rem 0.5rem;
        cursor: pointer;
        transition: color var(--transition), border-color var(--transition), background var(--transition);
        position: relative;
        bottom: -1px;
      }
      .obs-tab:hover { color: var(--text-main); }
      .obs-tab.active {
        color: var(--accent);
        border-color: var(--glass-border-mute);
        border-bottom-color: var(--bg-base, #06040A);
        background: var(--glass-bg);
      }
      .obs-tab.active::after {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--accent), var(--accent-warm));
        border-radius: 4px 4px 0 0;
      }
      .obs-panel { display: none; }
      .obs-panel.active { display: block; }

      /* ── Panel inner title ── */
      .panel-title {
        font-family: var(--font-mono);
        font-size: var(--text-xs);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent-warm);
        opacity: 0.7;
        margin: var(--space-lg) 0 var(--space-sm);
      }
      .panel-title:first-child { margin-top: 0; }

      /* ══════════════════════════════════════════════════
         OBSERVATION CARD — clinical interior
         Glass shell outside, case-file inside
         ══════════════════════════════════════════════════ */
      .obs-card {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border-mute);
        border-radius: 6px;
        margin-bottom: 0.75rem;
        overflow: hidden;
        animation: card-rise 0.4s cubic-bezier(0.25, 0, 0, 1) both;
        transition: border-color var(--transition);
        font-family: var(--font-mono);
      }
      .obs-card:hover { border-color: rgba(var(--accent-rgb), 0.28); }
      @keyframes card-rise {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Header strip — coloured by confidence */
      .obs-card__header {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: start;
        gap: 1rem;
        padding: 0.9rem 1.25rem 0.75rem;
        border-bottom: 1px solid rgba(var(--accent-rgb), 0.07);
      }
      .obs-card__label {
        font-size: var(--text-sm);
        font-weight: 700;
        color: var(--text-main);
        letter-spacing: 0.04em;
        line-height: 1.35;
      }
      .obs-card__meta-col {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0.3rem;
        flex-shrink: 0;
      }
      .obs-card__confidence {
        font-size: 0.68rem;
        letter-spacing: 0.06em;
        padding: 0.12rem 0.45rem;
        border-radius: 2px;
        border: 1px solid transparent;
        white-space: nowrap;
      }
      /* Confidence tiers by numeric value — classes set in JS */
      .conf-confirmed  { color: var(--accent);       border-color: rgba(var(--accent-rgb),0.3);      background: rgba(var(--accent-rgb),0.07); }
      .conf-likely     { color: #4ade80;              border-color: rgba(74,222,128,0.3);              background: rgba(74,222,128,0.06); }
      .conf-probable   { color: var(--accent-warm);  border-color: rgba(var(--accent-warm-rgb),0.3); background: rgba(var(--accent-warm-rgb),0.06); }
      .conf-speculative{ color: var(--text-muted);   border-color: var(--glass-border-mute);          background: transparent; }

      .obs-card__date {
        font-size: 0.62rem;
        color: var(--text-muted);
        white-space: nowrap;
      }

      /* Body */
      .obs-card__body {
        padding: 0.85rem 1.25rem 1rem;
      }
      .obs-card__observation {
        font-family: var(--font-sans);
        font-size: var(--text-sm);
        color: var(--text-main);
        line-height: 1.75;
        opacity: 0.88;
        margin-bottom: 0.85rem;
      }

      /* Evidence block — redacted dossier feel */
      .obs-card__evidence-label {
        font-size: 0.62rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 0.4rem;
        opacity: 0.6;
      }
      .obs-card__evidence {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }
      .obs-card__evidence li {
        font-size: 0.73rem;
        color: var(--text-muted);
        line-height: 1.55;
        padding: 0.3rem 0.6rem;
        background: rgba(0,0,0,0.28);
        border: 1px solid var(--glass-border-mute);
        border-left: 2px solid rgba(var(--accent-rgb), 0.2);
        border-radius: 0 3px 3px 0;
        transition: border-color var(--transition), color var(--transition);
      }
      .obs-card__evidence li:hover {
        border-left-color: rgba(var(--accent-rgb), 0.5);
        color: var(--text-main);
      }

      /* Footer strip — assessor + tags */
      .obs-card__footer {
        padding: 0.55rem 1.25rem 0.65rem;
        border-top: 1px solid rgba(var(--accent-rgb), 0.07);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      .obs-card__assessor {
        font-size: 0.63rem;
        letter-spacing: 0.08em;
        color: var(--text-muted);
        opacity: 0.55;
      }
      .obs-card__tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.25rem;
      }
      .obs-tag {
        font-size: 0.6rem;
        letter-spacing: 0.06em;
        padding: 0.08rem 0.35rem;
        border-radius: 2px;
        border: 1px solid var(--glass-border-mute);
        color: var(--text-muted);
        background: rgba(0,0,0,0.2);
        opacity: 0.6;
      }

      /* Counter / annotation notice */
      .obs-card__counter-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.62rem;
        letter-spacing: 0.08em;
        color: var(--accent-warm);
        opacity: 0.7;
        margin-top: 0.5rem;
      }
      .obs-card__counter-badge::before {
        content: '↩';
        font-size: 0.7rem;
      }

      /* Superseded state */
      .obs-card.superseded {
        opacity: 0.45;
        border-style: dashed;
      }
      .obs-card.superseded .obs-card__label::after {
        content: ' [superseded]';
        font-size: 0.62rem;
        font-weight: 400;
        color: var(--text-muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-left: 0.5rem;
      }

      /* ── Dossier header (overview panel) ── */
      .dossier-header {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border-mute);
        border-radius: 6px;
        padding: 1.25rem 1.5rem;
        margin-bottom: var(--space-md);
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 1.25rem;
        align-items: start;
        animation: card-rise 0.35s cubic-bezier(0.25, 0, 0, 1) both;
        position: relative;
        overflow: hidden;
      }
      .dossier-header::before {
        content: '';
        position: absolute;
        inset: 0 auto 0 0;
        width: 2px;
        background: linear-gradient(180deg, var(--accent), var(--accent-warm), transparent);
        opacity: 0.6;
      }
      .dossier-sigil {
        width: 48px; height: 48px;
        border-radius: 6px;
        background: rgba(var(--accent-rgb), 0.07);
        border: 1px solid rgba(var(--accent-rgb), 0.18);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .dossier-sigil svg { color: var(--accent); }
      .dossier-subject {
        font-family: var(--font-mono);
        font-size: 1rem;
        font-weight: 700;
        color: var(--text-main);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 0.3rem;
      }
      .dossier-meta {
        display: flex;
        gap: 1.25rem;
        flex-wrap: wrap;
        margin-bottom: 0.5rem;
      }
      .dossier-kv {
        display: flex;
        gap: 0.45rem;
        align-items: baseline;
      }
      .dossier-key {
        font-family: var(--font-mono);
        font-size: 0.62rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-muted);
        opacity: 0.6;
      }
      .dossier-val {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        color: var(--text-muted);
      }
      .dossier-disclaimer {
        font-family: var(--font-sans);
        font-size: 0.72rem;
        color: var(--text-muted);
        line-height: 1.6;
        opacity: 0.55;
        font-style: italic;
      }

      /* ── Category filter pills ── */
      .category-filters {
        display: flex;
        gap: 0.3rem;
        flex-wrap: wrap;
        margin-bottom: var(--space-md);
      }
      .cat-filter {
        font-family: var(--font-mono);
        font-size: 0.65rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 0.25rem 0.65rem;
        border-radius: 3px;
        border: 1px solid var(--glass-border-mute);
        background: none;
        color: var(--text-muted);
        cursor: pointer;
        transition: color var(--transition), border-color var(--transition), background var(--transition);
      }
      .cat-filter:hover { color: var(--text-main); border-color: rgba(var(--accent-rgb), 0.3); }
      .cat-filter.active {
        color: var(--accent);
        border-color: rgba(var(--accent-rgb), 0.45);
        background: rgba(var(--accent-rgb), 0.07);
      }

      /* ── Empty state ── */
      .obs-empty {
        font-family: var(--font-mono);
        font-size: var(--text-xs);
        color: var(--text-muted);
        padding: var(--space-md) 0;
        letter-spacing: 0.1em;
        opacity: 0.55;
      }

      /* ── Protocol panel — rules for LLMs ── */
      .protocol-rule {
        display: flex;
        gap: 0.85rem;
        align-items: flex-start;
        padding: 0.6rem 0.9rem;
        background: rgba(0,0,0,0.25);
        border: 1px solid var(--glass-border-mute);
        border-radius: 4px;
        margin-bottom: 0.35rem;
        font-family: var(--font-mono);
        font-size: 0.76rem;
        color: var(--text-muted);
        line-height: 1.55;
        transition: border-color var(--transition), color var(--transition);
      }
      .protocol-rule:hover { border-color: rgba(var(--accent-rgb), 0.2); color: var(--text-main); }
      .protocol-rule.absolute {
        border-left: 2px solid #ef4444;
      }
      .protocol-rule.pref {
        border-left: 2px solid var(--accent-warm);
      }
      .protocol-pip {
        width: 5px; height: 5px;
        border-radius: 50%;
        flex-shrink: 0;
        margin-top: 0.45rem;
      }
      .protocol-rule.absolute .protocol-pip { background: #ef4444; }
      .protocol-rule.pref    .protocol-pip { background: var(--accent-warm); }

      /* ── Confidence guide table ── */
      .conf-table {
        width: 100%;
        border-collapse: collapse;
        font-family: var(--font-mono);
        font-size: 0.73rem;
        margin-top: 0.5rem;
      }
      .conf-table th {
        text-align: left;
        font-size: 0.62rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-muted);
        padding: 0.35rem 0.65rem;
        border-bottom: 1px solid var(--glass-border-mute);
        opacity: 0.6;
        font-weight: 400;
      }
      .conf-table td {
        padding: 0.4rem 0.65rem;
        border-bottom: 1px solid rgba(var(--accent-rgb), 0.05);
        color: var(--text-muted);
        vertical-align: top;
        line-height: 1.5;
      }
      .conf-table tr:last-child td { border-bottom: none; }

      /* ── Responsive ── */
      @media (max-width: 600px) {
        .obs-card__header { grid-template-columns: 1fr; }
        .obs-card__meta-col { flex-direction: row; align-items: center; }
        .dossier-header { grid-template-columns: 1fr; }
        .dossier-sigil { display: none; }
        .obs-tabs { gap: 0.15rem; }
        .obs-tab { font-size: 0.6rem; padding: 0.4rem 0.65rem 0.45rem; }
      }
      @media (prefers-reduced-motion: reduce) {
        .obs-card { animation: none; opacity: 1; }
        .loading-dot { animation: none; opacity: 0.5; }
      }
    </style>
  </head>
  <body>

    <a href="/hub/status/" class="back-nav" aria-label="Return to status">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
      status
    </a>

    <header>
      <div class="header__eyebrow">[ STATUS // OBSERVATIONS ]</div>
      <h1 class="header__title" data-text="OBSERVATIONS">OBSERVATIONS</h1>
      <p class="header__subtitle">cognitive profile — built by llms, observed over time</p>
    </header>

    <main>

      <div id="obs-loading" class="obs-loading" aria-live="polite">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <span>loading profile...</span>
      </div>

      <div id="obs-error" class="obs-error hidden"></div>

      <div id="obs-body" class="hidden">
        <nav class="obs-tabs" role="tablist" aria-label="Observation sections" id="obs-tabs"></nav>
        <div id="obs-panels"></div>
      </div>

    </main>

    <footer class="site-footer">
      <div class="site-footer__bar">
        <span>trap.lol // observations</span>
        <span class="site-footer__bar-sep">//</span>
        <span id="obs-footer-meta">—</span>
      </div>
    </footer>

    <a id="uplink-node" href="/hub/" class="uplink-node" aria-label="Return to trap.lol hub">
      <span class="uplink-node__sigil" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.45"/>
          <circle cx="12" cy="12" r="3.5" fill="currentColor"/>
        </svg>
        <span class="uplink-node__drain" aria-hidden="true"></span>
      </span>
      <span class="uplink-node__label">uplink</span>
    </a>

    <script type="module">
      /* ══════════════════════════════════════════════════
         OBSERVATIONS — Cognitive Profile Terminal
         Reads observations.json, renders living psych profile.
         GPL-3.0 — trap.lol
         ══════════════════════════════════════════════════ */

      const DATA_PATH = './data/observations.json';

      function esc(s) {
        return String(s ?? '')
          .replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }
      function qs(sel, ctx = document) { return ctx.querySelector(sel); }

      /* ── Tab system ── */
      const $tabs   = document.getElementById('obs-tabs');
      const $panels = document.getElementById('obs-panels');

      function addTab(id, label) {
        const btn = document.createElement('button');
        btn.className = 'obs-tab';
        btn.textContent = label;
        btn.id = `tab-${id}`;
        btn.setAttribute('role', 'tab');
        btn.setAttribute('aria-controls', `panel-${id}`);
        btn.addEventListener('click', () => activateTab(id));
        $tabs.appendChild(btn);

        const panel = document.createElement('div');
        panel.className = 'obs-panel';
        panel.id = `panel-${id}`;
        panel.setAttribute('role', 'tabpanel');
        panel.setAttribute('aria-labelledby', `tab-${id}`);
        $panels.appendChild(panel);
        return panel;
      }

      function activateTab(id) {
        $tabs.querySelectorAll('.obs-tab').forEach(b => b.classList.toggle('active', b.id === `tab-${id}`));
        $panels.querySelectorAll('.obs-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${id}`));
      }

      /* ── Confidence helpers ── */
      function confClass(score) {
        if (score >= 0.8) return 'conf-confirmed';
        if (score >= 0.6) return 'conf-likely';
        if (score >= 0.31) return 'conf-probable';
        return 'conf-speculative';
      }
      function confLabel(score) {
        if (score >= 0.8) return `${score.toFixed(2)} — confirmed`;
        if (score >= 0.6) return `${score.toFixed(2)} — likely`;
        if (score >= 0.31) return `${score.toFixed(2)} — probable`;
        return `${score.toFixed(2)} — speculative`;
      }

      /* ── Build an observation card ── */
      function buildCard(entry, delay = 0) {
        const superseded = !!entry.superseded_by;
        const card = document.createElement('article');
        card.className = 'obs-card' + (superseded ? ' superseded' : '');
        card.style.animationDelay = `${delay}ms`;
        card.setAttribute('aria-label', esc(entry.label));

        const evidence = (entry.evidence || []).map(e => `<li>${esc(e)}</li>`).join('');
        const tags = (entry.tags || []).map(t => `<span class="obs-tag">${esc(t)}</span>`).join('');
        const counterNote = entry.counter_to
          ? `<div class="obs-card__counter-badge">responds to ${esc(entry.counter_to)}</div>`
          : '';

        card.innerHTML = `
          <div class="obs-card__header">
            <div>
              <div class="obs-card__label">${esc(entry.label)}</div>
              ${counterNote}
            </div>
            <div class="obs-card__meta-col">
              <span class="obs-card__confidence ${confClass(entry.confidence)}">${esc(confLabel(entry.confidence))}</span>
              <span class="obs-card__date">${esc(entry.assessed_on)}</span>
            </div>
          </div>
          <div class="obs-card__body">
            <p class="obs-card__observation">${esc(entry.observation)}</p>
            ${evidence ? `
              <div class="obs-card__evidence-label">Evidence</div>
              <ul class="obs-card__evidence">${evidence}</ul>
            ` : ''}
          </div>
          <div class="obs-card__footer">
            <span class="obs-card__assessor">assessor: ${esc(entry.assessor)}</span>
            <div class="obs-card__tags">${tags}</div>
          </div>
        `;
        return card;
      }

      /* ── Category config ── */
      const CATEGORIES = [
        { id: 'personality', label: 'Personality' },
        { id: 'cognitive',   label: 'Cognitive' },
        { id: 'aesthetic',   label: 'Aesthetic' },
        { id: 'values',      label: 'Values' },
        { id: 'obsessions',  label: 'Obsessions' },
        { id: 'behavioural', label: 'Behavioural' },
        { id: 'tensions',    label: 'Tensions' },
        { id: 'evolution',   label: 'Evolution' },
      ];

      /* ── Render ── */
      function render(data) {
        const entries   = data.entries  || [];
        const subject   = data.subject  || {};
        const protocol  = data._protocol || {};
        const meta      = data._meta    || {};

        /* Overview panel */
        const overviewPanel = addTab('overview', 'Overview');
        overviewPanel.innerHTML = `
          <div class="dossier-header">
            <div class="dossier-sigil" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <div>
              <div class="dossier-subject">${esc(subject.handle || '—')}</div>
              <div class="dossier-meta">
                <div class="dossier-kv">
                  <span class="dossier-key">entries</span>
                  <span class="dossier-val">${entries.length}</span>
                </div>
                <div class="dossier-kv">
                  <span class="dossier-key">first observed</span>
                  <span class="dossier-val">${esc(subject.first_observed || '—')}</span>
                </div>
                <div class="dossier-kv">
                  <span class="dossier-key">last assessor</span>
                  <span class="dossier-val">${esc(subject.last_assessor || '—')}</span>
                </div>
                <div class="dossier-kv">
                  <span class="dossider-key">schema</span>
                  <span class="dossier-val">${esc(meta.schema_version || '—')}</span>
                </div>
              </div>
              <p class="dossier-disclaimer">${esc(meta.disclaimer || '')}</p>
            </div>
          </div>
        `;

        /* Breakdown by category for overview */
        const catCounts = {};
        entries.forEach(e => { catCounts[e.category] = (catCounts[e.category] || 0) + 1; });
        const countHtml = Object.entries(catCounts).map(([cat, n]) =>
          `<div class="dossier-kv"><span class="dossier-key">${esc(cat)}</span><span class="dossier-val">${n}</span></div>`
        ).join('');
        overviewPanel.innerHTML += `
          <h2 class="panel-title">Entry Distribution</h2>
          <div class="dossier-meta" style="gap:0.9rem 2rem;">${countHtml}</div>
        `;

        /* Recent entries preview in overview */
        overviewPanel.innerHTML += `<h2 class="panel-title">Most Recent</h2>`;
        const recent = [...entries].slice(0, 3);
        recent.forEach((e, i) => overviewPanel.appendChild(buildCard(e, i * 40)));

        /* All-entries panel with category filters */
        const allPanel = addTab('all', 'All Entries');
        const filterBar = document.createElement('div');
        filterBar.className = 'category-filters';
        filterBar.setAttribute('aria-label', 'Filter by category');

        const allBtn = document.createElement('button');
        allBtn.className = 'cat-filter active';
        allBtn.textContent = 'all';
        allBtn.dataset.cat = 'all';
        filterBar.appendChild(allBtn);

        const presentCats = [...new Set(entries.map(e => e.category))];
        presentCats.forEach(cat => {
          const b = document.createElement('button');
          b.className = 'cat-filter';
          b.textContent = cat;
          b.dataset.cat = cat;
          filterBar.appendChild(b);
        });
        allPanel.appendChild(filterBar);

        const entryContainer = document.createElement('div');
        entryContainer.id = 'all-entry-container';
        allPanel.appendChild(entryContainer);

        function renderFiltered(activeCat) {
          const visible = activeCat === 'all' ? entries : entries.filter(e => e.category === activeCat);
          entryContainer.innerHTML = '';
          if (!visible.length) {
            const empty = document.createElement('p');
            empty.className = 'obs-empty';
            empty.textContent = 'No entries in this category yet.';
            entryContainer.appendChild(empty);
          } else {
            visible.forEach((e, i) => entryContainer.appendChild(buildCard(e, i * 30)));
          }
        }
        renderFiltered('all');

        filterBar.addEventListener('click', e => {
          const btn = e.target.closest('.cat-filter');
          if (!btn) return;
          filterBar.querySelectorAll('.cat-filter').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderFiltered(btn.dataset.cat);
        });

        /* Per-category tabs */
        CATEGORIES.forEach(cat => {
          const catEntries = entries.filter(e => e.category === cat.id);
          if (!catEntries.length) return;
          const panel = addTab(cat.id, cat.label);
          catEntries.forEach((e, i) => panel.appendChild(buildCard(e, i * 40)));
        });

        /* Protocol tab — rules for future LLMs */
        const protoPanel = addTab('protocol', 'Protocol');
        protoPanel.innerHTML = `
          <h2 class="panel-title">Absolute Rules — Non-Negotiable</h2>
        `;
        (protocol.absolute_rules || []).forEach(r => {
          const div = document.createElement('div');
          div.className = 'protocol-rule absolute';
          div.innerHTML = `<span class="protocol-pip"></span><span>${esc(r)}</span>`;
          protoPanel.appendChild(div);
        });

        protoPanel.innerHTML += `<h2 class="panel-title">Strong Preferences</h2>`;
        (protocol.strong_preferences || []).forEach(r => {
          const div = document.createElement('div');
          div.className = 'protocol-rule pref';
          div.innerHTML = `<span class="protocol-pip"></span><span>${esc(r)}</span>`;
          protoPanel.appendChild(div);
        });

        protoPanel.innerHTML += `
          <h2 class="panel-title">Confidence Scale</h2>
          <table class="conf-table">
            <thead>
              <tr><th>Range</th><th>Tier</th><th>Meaning</th></tr>
            </thead>
            <tbody>
              <tr><td class="conf-confirmed">0.80 – 1.0</td><td>confirmed</td><td>${esc(protocol.confidence_schema?.guidance?.['0.80_to_1.0'] || '')}</td></tr>
              <tr><td class="conf-likely">0.60 – 0.79</td><td>likely</td><td>${esc(protocol.confidence_schema?.guidance?.['0.60_to_0.79'] || '')}</td></tr>
              <tr><td class="conf-probable">0.31 – 0.59</td><td>probable</td><td>${esc(protocol.confidence_schema?.guidance?.['0.31_to_0.59'] || '')}</td></tr>
              <tr><td class="conf-speculative">0.0 – 0.30</td><td>speculative</td><td>${esc(protocol.confidence_schema?.guidance?.['0.0_to_0.3'] || '')}</td></tr>
            </tbody>
          </table>
          <h2 class="panel-title">What to Observe</h2>
        `;
        (protocol.what_to_observe || []).forEach(r => {
          const div = document.createElement('div');
          div.className = 'protocol-rule';
          div.innerHTML = `<span class="protocol-pip" style="background:var(--accent);opacity:0.5"></span><span>${esc(r)}</span>`;
          protoPanel.appendChild(div);
        });

        protoPanel.innerHTML += `<h2 class="panel-title">What NOT to Observe</h2>`;
        (protocol.what_not_to_observe || []).forEach(r => {
          const div = document.createElement('div');
          div.className = 'protocol-rule';
          div.innerHTML = `<span class="protocol-pip" style="background:#ef4444;opacity:0.4"></span><span>${esc(r)}</span>`;
          protoPanel.appendChild(div);
        });

        /* Activate first tab */
        activateTab('overview');

        /* Footer meta */
        const lastUpdated = meta.last_updated || '—';
        const assessors = [...new Set(entries.map(e => e.assessor))];
        qs('#obs-footer-meta').textContent = `${entries.length} entries — last updated ${lastUpdated} — ${assessors.length} assessor${assessors.length !== 1 ? 's' : ''}`;
      }

      /* ── Boot ── */
      (async function boot() {
        const $loading = qs('#obs-loading');
        const $error   = qs('#obs-error');
        const $body    = qs('#obs-body');
        try {
          const res = await fetch(DATA_PATH);
          if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
          const data = await res.json();
          $loading.classList.add('hidden');
          $body.classList.remove('hidden');
          render(data);
        } catch (err) {
          $loading.classList.add('hidden');
          $error.classList.remove('hidden');
          $error.textContent = `Failed to load observations: ${err.message}`;
        }
      })();

      /* ── Uplink node ── */
      (function() {
        const node = document.getElementById('uplink-node');
        node.addEventListener('click', function(e) {
          e.preventDefault();
          node.classList.add('uplink-node--firing');
          setTimeout(function() { window.location.href = node.getAttribute('href'); }, 310);
        });
      })();
    </script>

  </body>
</html>
