name: wallhaven-proxy

services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: wallhaven-proxy:latest
    container_name: wallhaven-proxy
    restart: unless-stopped

    environment:
      # Bind address inside the container
      LISTEN_ADDR: ":8080"

      # Comma-separated list of allowed CORS origins.
      # Lock this down to your actual frontend domain(s).
      # Use * to allow all (fine while behind Cloudflare Access).
      ALLOWED_ORIGINS: "https://trap.lol,https://www.trap.lol"

    ports:
      # Only bind to localhost — Cloudflare Tunnel reaches in directly,
      # so we never need to expose this to the public internet.
      - "127.0.0.1:8080:8080"

    networks:
      - default
      - cloudflare-gateway

    # Read-only filesystem; the binary needs nothing writable
    read_only: true

    # Drop every Linux capability
    cap_drop:
      - ALL

    # No privilege escalation
    security_opt:
      - no-new-privileges:true

    # Tiny resource envelope — the proxy is intentionally featherweight
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
        reservations:
          memory: 16M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      com.trap-lol.service: "wallhaven-proxy"
      com.trap-lol.description: "Lightweight CORS proxy for the Wallhaven API"

networks:
  cloudflare-gateway:
    external: true
