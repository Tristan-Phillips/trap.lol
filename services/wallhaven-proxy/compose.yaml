name: wallhaven-proxy

services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: wallhaven-proxy:latest
    container_name: wallhaven-proxy
    restart: unless-stopped

    environment:
      LISTEN_ADDR: ":8080"
      ALLOWED_ORIGINS: "https://trap.lol,https://www.trap.lol"
      DB_PATH: "/data/wallhaven.db"

    ports:
      # Only bind to localhost — Cloudflare Tunnel reaches in directly
      - "127.0.0.1:8080:8080"

    volumes:
      - ./data:/data

    networks:
      - default
      - cloudflare-gateway

    # Drop every Linux capability
    cap_drop:
      - ALL

    # No privilege escalation
    security_opt:
      - no-new-privileges:true

    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 32M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      com.trap-lol.service: "wallhaven-proxy"
      com.trap-lol.description: "Wallhaven API proxy + image proxy + vault storage"

networks:
  cloudflare-gateway:
    external: true
