name: wallhaven-proxy

x-baseline: &baseline
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"
  security_opt:
    - no-new-privileges:true

services:
  proxy:
    <<: *baseline
    build:
      context: .
      dockerfile: Dockerfile
    image: wallhaven-proxy:latest
    container_name: wallhaven-proxy

    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Africa/Johannesburg
      LISTEN_ADDR: ":8080"
      ALLOWED_ORIGINS: "https://trap.lol,https://www.trap.lol"
      DB_PATH: "/data/wallhaven.db"

    volumes:
      - wallhaven-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

    ports:
      - "127.0.0.1:8080:8080"

    networks:
      - cloudflare-gateway

    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 32M

    labels:
      com.trap-lol.service: "wallhaven-proxy"
      com.trap-lol.description: "Wallhaven API proxy + image proxy + vault storage"

volumes:
  wallhaven-data:
    driver: local

networks:
  cloudflare-gateway:
    external: true
